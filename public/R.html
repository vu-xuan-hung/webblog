<canvas id="cv" width="672" height="878"></canvas>
<script>
const DPR=window.devicePixelRatio||1;
const canvas=document.getElementById('cv');
const ctx=canvas.getContext('2d');
resize();
window.addEventListener('resize',resize);
function resize(){canvas.width=innerWidth*DPR;canvas.height=innerHeight*DPR;}

function clamp(v,min,max){return v<min?min:v>max?max:v;}
function lerp(a,b,t){return a+(b-a)*t;}

let wolf={x:canvas.width/2,y:canvas.height/2,vx:0,vy:0,speed:0.15*DPR,boost:1,heading:0,size:40*DPR};
let target={x:wolf.x,y:wolf.y};
let lastMove=performance.now();
let orbitAngle=0;const orbitRadius=60*DPR;

canvas.addEventListener('mousemove',e=>{target.x=e.clientX*DPR;target.y=e.clientY*DPR;lastMove=performance.now();});
canvas.addEventListener('click',()=>{wolf.boost=2;setTimeout(()=>wolf.boost=1,600);});

// body snake style
const SEG_COUNT=20;
const SEG_LEN=wolf.size*0.28;
const segments=new Array(SEG_COUNT).fill(0).map(()=>({x:wolf.x,y:wolf.y,angle:0}));
const path=[];
let trails=[]; // vệt bóng (giữ ở đầu thôi, bỏ bóng cánh)

function drawWings(s){
  const flap=(Math.sin(performance.now()*0.006))*0.5; // flap tự nhiên
  ctx.fillStyle="#fff";
  ctx.strokeStyle="#fff";
  ctx.shadowColor="#fff";
  ctx.shadowBlur=8*DPR;
  ctx.lineWidth=1.2*DPR;

  function wing(scale=1,offset=0,flip=false){
    // flip = true => lật ngược (đầu nhọn xuống)
    const dir = flip ? -1 : 1;

    // trái
    ctx.save();
    ctx.rotate(-Math.PI/3 * dir - flap + offset);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(-s*3.5*scale, -s*1.2*scale*dir);
    ctx.lineTo(-s*2.2*scale,0);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();

    // phải
    ctx.save();
    ctx.rotate(Math.PI/3 * dir + flap - offset);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(-s*3.5*scale, s*1.2*scale*dir);
    ctx.lineTo(-s*2.2*scale,0);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  // cánh chính
  wing(1,0,false);

  // cánh phụ 70% ngay dưới
  //wing(0.7,0,false); // flip = true => đầu nhọn xuống

  // cánh thứ 3 nhỏ hơn 50%, nằm sau cặp phụ
  wing(0.5,0.2,false);

  ctx.shadowBlur=0;
}


function drawWolf() {
  // body segments
  for (let i = segments.length - 1; i >= 0; i--) {
    const seg = segments[i];
    ctx.save();
    ctx.translate(seg.x, seg.y);
    ctx.rotate(seg.angle);

    ctx.shadowColor = "#fff";
    ctx.shadowBlur = 6*DPR;

    if (i === segments.length - 1) {
      // đốt cuối nhọn
      const s = wolf.size*0.6;
      ctx.fillStyle = "#000";
      ctx.strokeStyle = "#fff";
      ctx.beginPath();
      ctx.moveTo(-s*0.8,0);
      ctx.lineTo(s*0.3,-s*0.3);
      ctx.lineTo(s*0.1,0);
      ctx.lineTo(s*0.3, s*0.3);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    } else {
      // đốt kim cương dẹt
      const w = wolf.size*0.35, h = wolf.size*0.25;
      ctx.fillStyle = "#000";
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 0.8*DPR;
      ctx.beginPath();
      ctx.moveTo(0,-h/2);
      ctx.lineTo(w/2,0);
      ctx.lineTo(0,h/2);
      ctx.lineTo(-w/2,0);
      ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    ctx.restore();
  }

  // cánh gắn vào đốt thứ 4
  const wingSeg = segments[3]; // đốt số 4 (index 3)
  ctx.save();
  ctx.translate(wingSeg.x, wingSeg.y);
  ctx.rotate(wingSeg.angle);
  const wingSize = wolf.size * 1.2; // cỡ cánh như trước
  drawWings(wingSize);
  ctx.restore();

  
   // cánh gắn vào đốt thứ 8
  const wingSeg2 = segments[11]; // đốt số 4 (index 3)
  ctx.save();
  ctx.translate(wingSeg2.x, wingSeg2.y);
  ctx.rotate(wingSeg2.angle);
  const wingSize2 = wolf.size * 1.2; // cỡ cánh như trước
  drawWings(wingSize2);
  ctx.restore();


  // head
  const headSeg = segments[0];
  ctx.save();
  ctx.translate(headSeg.x, headSeg.y);
  ctx.rotate(wolf.heading);

  const s = wolf.size*1.2; // tăng đầu lớn hơn
 

  ctx.shadowColor = "#fff";
  ctx.shadowBlur = 10*DPR;
  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 1.5*DPR;
  ctx.beginPath();
  ctx.moveTo(s*0.8,0);       // mũi nhọn ra trước
  ctx.lineTo(-s*0.3,-s*0.3);
  ctx.lineTo(-s*0.1,0);
  ctx.lineTo(-s*0.3, s*0.3);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // mắt trắng
  // kính tam giác dẹt, nhọn về phía mõm
  const scale = 1.5;    // tăng kích thước tổng thể
  const squashX = 0.35;  // ép ngang mạnh
  const cutDepth = -0.5; // đẩy sâu phần đít
  
  ctx.shadowColor = "#fff";
  ctx.shadowBlur = 10*DPR;
  ctx.fillStyle = "#F00";
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 1.5*DPR;
  ctx.beginPath();
  ctx.moveTo(s*0.8*scale*squashX, 0);                 // mũi nhọn
  ctx.lineTo(-s*0.3*scale*squashX, -s*0.3*scale);     // góc trên
  ctx.lineTo(-s*cutDepth*scale*squashX, 0);           // điểm sau sâu hơn
  ctx.lineTo(-s*0.3*scale*squashX, s*0.3*scale);      // góc dưới
  ctx.closePath();
  ctx.fill(); 
  ctx.stroke();
  
  const scale2 = 2.5;    // tăng kích thước tổng thể
  const squashX2 = 0.5;  // ép ngang mạnh
  const cutDepth2 = -0.5; // đẩy sâu phần đít
  const backOffset = -s*0.2; // lùi về sau 1 chút
  
  ctx.shadowColor = "#fff";
  ctx.shadowBlur = 10*DPR;
  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 1.5*DPR;
  ctx.beginPath();
  ctx.moveTo(s*0.8*scale2*squashX2 + backOffset, 0);                 // mũi nhọn
  ctx.lineTo(-s*0.3*scale2*squashX2 + backOffset, -s*0.3*scale2);    // góc trên
  ctx.lineTo(-s*cutDepth2*scale2*squashX2 + backOffset, 0);          // điểm sau sâu hơn
  ctx.lineTo(-s*0.3*scale2*squashX2 + backOffset, s*0.3*scale2);     // góc dưới
  ctx.closePath();
  ctx.fill(); 
  ctx.stroke();


  ctx.restore();
  ctx.shadowBlur = 0;
}


let lastT=performance.now();

let orbitDir = 1;         // 1 = xoay thuận chiều kim, -1 = ngược
let lastOrbitChange = performance.now();
let orbitChangeInterval = 2000 + Math.random()*3000; // 2-5s

function tick(){
  const now=performance.now();const dt=now-lastT;lastT=now;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(now-lastMove>1500) {
    // đổi hướng ngẫu nhiên sau vài s
    if(now - lastOrbitChange > orbitChangeInterval){
      orbitDir *= -1; 
      lastOrbitChange = now;
      orbitChangeInterval = 2000 + Math.random()*3000;
    }

    orbitAngle += dt*0.001 * orbitDir;
    target.x = wolf.x + Math.cos(orbitAngle)*orbitRadius;
    target.y = wolf.y + Math.sin(orbitAngle)*orbitRadius;
  }

  // move head
  const dx=target.x-wolf.x,dy=target.y-wolf.y;
  const dist=Math.hypot(dx,dy);
  const targetHeading=Math.atan2(dy,dx);
  let dh=targetHeading-wolf.heading;
  dh=Math.atan2(Math.sin(dh),Math.cos(dh));
  wolf.heading+=dh*0.08;

  const base=wolf.speed*wolf.boost;
  const spd=clamp(base*(1+Math.min(dist/(220*DPR),1.6)),base*0.6,base*2.0);
  wolf.vx=Math.cos(wolf.heading)*spd;
  wolf.vy=Math.sin(wolf.heading)*spd;
  wolf.x+=wolf.vx*dt;
  wolf.y+=wolf.vy*dt;

  // path lưu dấu
  path.unshift({x:wolf.x,y:wolf.y});
  while(path.length>SEG_COUNT*SEG_LEN*1.5) path.pop();

  // update segments
  for(let i=0;i<SEG_COUNT;i++){
    const idx=Math.floor(i*SEG_LEN);
    if(idx<path.length){
      const p=path[idx];
      segments[i].x=p.x;
      segments[i].y=p.y;
      if(i>0){
        const prev=segments[i-1];
        segments[i].angle=Math.atan2(prev.y-segments[i].y,prev.x-segments[i].x);
      } else {
        segments[i].angle=wolf.heading;
      }
    }
  }


  drawWolf();
  requestAnimationFrame(tick);
}
tick();
</script>
