<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drag and Drop File Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #f3f4f6;
      }
      #drop-zone {
        min-height: 12rem;
        cursor: pointer;
      }
      #drop-zone.over {
        border-color: #3b82f6;
        background-color: #e0f2fe;
        box-shadow: 0 0 0 4px #bfdbfe;
      }
      .file-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
    </style>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl p-8 space-y-8">
      <header class="text-center">
        <h1 class="text-3xl sm:text-4xl font-bold text-gray-800">
          File Uploader
        </h1>
        <p class="mt-2 text-base sm:text-lg text-gray-500">
          Drag and drop your files here to upload.
        </p>
      </header>

      <main class="space-y-6">
        <!-- Drop Zone -->
        <div
          id="drop-zone"
          class="bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl p-6 flex items-center justify-center text-center transition-all duration-300 ease-in-out"
        >
          <div>
            <!-- Hidden file input to be triggered by clicking the drop zone -->
            <input type="file" id="file-input" class="hidden" multiple />
            <svg
              class="mx-auto h-12 w-12 text-gray-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v9"
              />
            </svg>
            <p class="mt-2 text-sm text-gray-600">
              <span class="font-semibold">Click to upload</span> or drag and
              drop
            </p>
            <p class="text-xs text-gray-500">PNG, JPG, GIF up to 10MB</p>
          </div>
        </div>

        <!-- File List -->
        <div id="file-list-container" class="space-y-4">
          <h2 class="text-xl font-semibold text-gray-700">Uploaded Files</h2>
          <ul id="file-list" class="divide-y divide-gray-200">
            <!-- Dropped files will be listed here -->
          </ul>
          <div
            id="no-files-message"
            class="text-center text-gray-500 text-sm mt-4"
          >
            No files uploaded yet.
          </div>
        </div>
      </main>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const fileList = document.getElementById("file-list");
        const noFilesMessage = document.getElementById("no-files-message");

        // Prevent default drag behaviors
        ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
          dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
          e.preventDefault();
          e.stopPropagation();
        }

        // Add visual feedback
        ["dragenter", "dragover"].forEach((eventName) => {
          dropZone.addEventListener(
            eventName,
            () => dropZone.classList.add("over"),
            false
          );
        });

        ["dragleave", "drop"].forEach((eventName) => {
          dropZone.addEventListener(
            eventName,
            () => dropZone.classList.remove("over"),
            false
          );
        });

        // Handle dropped files
        dropZone.addEventListener("drop", handleDrop, false);

        function handleDrop(e) {
          const dt = e.dataTransfer;
          const files = dt.files;

          if (files.length > 0) {
            noFilesMessage.classList.add("hidden");
            handleFiles(files);
          }
        }

        // Handle file input click
        dropZone.addEventListener("click", () => {
          fileInput.click();
        });

        // Handle files selected via file input
        fileInput.addEventListener("change", () => {
          const files = fileInput.files;
          if (files.length > 0) {
            noFilesMessage.classList.add("hidden");
            handleFiles(files);
          }
        });

        // Process files and display them in the UI
        function handleFiles(files) {
          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const listItem = document.createElement("li");
            listItem.className = "file-item py-3";

            const fileNameSpan = document.createElement("span");
            fileNameSpan.className = "text-gray-900 font-medium truncate";
            fileNameSpan.textContent = file.name;

            const fileSizeSpan = document.createElement("span");
            fileSizeSpan.className =
              "text-gray-500 text-sm ml-2 whitespace-nowrap";
            fileSizeSpan.textContent = `(${formatBytes(file.size)})`;

            const fileInfoDiv = document.createElement("div");
            fileInfoDiv.className = "flex items-center";
            fileInfoDiv.appendChild(fileNameSpan);
            fileInfoDiv.appendChild(fileSizeSpan);

            listItem.appendChild(fileInfoDiv);
            fileList.appendChild(listItem);

            // For a real application, you would add an upload function here
            // e.g., uploadFile(file);
            uploadFile(file);
          }
        }

        async function uploadFile(file) {
          const API_URL = "http://localhost:8080/Upload"; // Replace with your server's API endpoint

          const formData = new FormData();
          // The key "file" must match the @RequestParam name in your Spring Boot controller.
          formData.append("file", file);

          try {
            const response = await fetch(API_URL, {
              method: "POST",
              body: formData,
            });

            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(
                `Server responded with status: ${response.status} - ${errorText}`
              );
            }

            //const result = await response.text(); đoạn code này để nhận response khi server trả về
          } catch (error) {
            console.error("Upload failed:", error);
          }
        }

        function formatBytes(bytes, decimals = 2) {
          if (bytes === 0) return "0 Bytes";

          const k = 1024;
          const dm = decimals < 0 ? 0 : decimals;
          const sizes = [
            "Bytes",
            "KB",
            "MB",
            "GB",
            "TB",
            "PB",
            "EB",
            "ZB",
            "YB",
          ];

          const i = Math.floor(Math.log(bytes) / Math.log(k));

          return (
            parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + " " + sizes[i]
          );
        }
      });
    </script>
  </body>
</html>
